name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (retry 2)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry_2
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before final retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (retry 3)
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure'
        id: deployment_retry_3
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Fail if all deployment attempts failed
        if: >-
          steps.deployment.outcome == 'failure' &&
          (steps.deployment_retry_2.outcome == 'failure' || steps.deployment_retry_2.outcome == 'skipped') &&
          (steps.deployment_retry_3.outcome == 'failure' || steps.deployment_retry_3.outcome == 'skipped')
        run: |
          echo "::error::GitHub Pages deployment failed after 3 attempts."
          echo "Open Settings → Pages, switch source away from GitHub Actions and back, then re-run this workflow."
          exit 1